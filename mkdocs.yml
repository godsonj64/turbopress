site_name: TurboPress
site_description: Certified low-bit LLM weight quantization
site_url: https://godsonj64.github.io/turbopress/
repo_url: https://github.com/godsonj64/turbopress
repo_name: godsonj64/turbopress

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - CLI: cli.md
  - Hosted service: hosted.md
  - Certificate format: certificate.md
  - Research: research.md
  - Limitations: limitations.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
