name: service-ci

on:
  push:
    branches: [main]
    paths:
      - "service/**"
      - "action/**"
      - "worker/**"
      - "turbopress/certificate.py"
      - "pyproject.toml"
  pull_request:
    paths:
      - "service/**"
      - "action/**"
      - "worker/**"
      - "turbopress/certificate.py"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install control-plane deps (turbopress without torch)
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps .
          pip install -r service/requirements.txt pytest ruff
      - name: Lint service/worker/action
        run: ruff check service action worker
      - name: Test control plane (inline runner, no GPU)
        run: pytest service/tests -q
      - name: Syntax-check the action entrypoint
        run: python -m py_compile action/compress.py
