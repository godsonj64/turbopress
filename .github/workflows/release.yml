name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) when a version tag is pushed.
# One-time setup on PyPI: add a "pending publisher" for project `turbopress`
#   owner: godsonj64   repository: turbopress   workflow: release.yml
# (https://pypi.org/manage/account/publishing/). No API token or secret needed.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # `gh release create` fires both the `release` and tag-`push` events,
          # so two runs race to upload. Let the loser skip the already-uploaded
          # files (400 "file already exists") instead of failing red.
          skip-existing: true
